# Server
server.port=8080

# PostgreSQL (override with env: SPRING_DATASOURCE_URL, etc.)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bible_memory}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS - allow Vite dev server (5173) and Angular dev (4200)
cors.allowed-origins=http://localhost:5173,http://localhost:4200

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# JWT (override with env: JWT_SECRET)
jwt.secret=${JWT_SECRET:default-secret-key-change-in-production-min-256-bits}
